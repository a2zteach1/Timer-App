<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="shortcut icon" href="image/logo.png" type="image/x-icon">
    
    <!-- Google AdSense Code -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2303237000800370" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #ff0076, #590fb7);
            --fs-bg: linear-gradient(135deg, #12c2e9 0%, #3a7bd5 50%, #6190e8 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Arial Black', sans-serif;
            /* Allow scrolling if content is too large for small screens */
            overflow-y: auto; 
            padding: 20px 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Container UI */
        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10;
        }

        /* FULL SCREEN OVERLAY */
        #fs-overlay {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: var(--fs-bg);
            z-index: 9999;
            padding: 0 8%; 
        }

        body.fullscreen-mode {
            overflow: hidden; /* Lock scroll in fullscreen */
        }

        body.fullscreen-mode #fs-overlay {
            display: flex;
        }

        .fs-timer {
            font-size: min(18vw, 45vh); 
            font-weight: 900;
            color: white;
            text-align: center;
            line-height: 1;
            white-space: nowrap;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(255,255,255,0.3);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .exit-fs {
            position: absolute;
            bottom: 40px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .exit-fs:hover { background: white; color: #3a7bd5; }

        /* Mode Switcher */
        .mode-switch {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin-bottom: 25px;
            padding: 4px;
        }
        .mode-switch button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .mode-switch button.active { background: var(--primary-gradient); }

        /* Scroll Wheels */
        .picker-container {
            display: flex;
            justify-content: center;
            height: 150px;
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        /* Selection Highlight Bar */
        .picker-container::after {
            content: '';
            position: absolute;
            top: 50px;
            left: 10px;
            right: 10px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            pointer-events: none;
        }

        .scroll-wheel {
            height: 150px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            width: 70px;
            /* Ensures touch scrolling works smoothly on mobile */
            -webkit-overflow-scrolling: touch; 
        }
        .scroll-wheel::-webkit-scrollbar { display: none; }
        .scroll-wheel div {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.3);
            scroll-snap-align: center;
            transition: 0.2s;
        }
        .scroll-wheel div.selected { color: white; font-weight: bold; font-size: 2rem; }

        #display { font-size: 3.5rem; color: white; font-weight: bold; margin: 20px 0; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 14px; font-size: 0.9rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; transition: 0.3s; }
        .start { background: linear-gradient(to right, #00b09b, #96c93d); grid-column: span 2; }
        .pause { background: linear-gradient(to right, #f8ff00, #ff9100); }
        .reset { background: linear-gradient(to right, #ff416c, #ff4b2b); }
        .fs-btn { background: rgba(255,255,255,0.2); grid-column: span 2; margin-top: 10px; border: 1px solid rgba(255,255,255,0.3); }

        .hidden { display: none; }
        
        .footer { 
            margin-top: 25px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #fff; 
            text-align: center; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>Timer App</h1>
        <div class="mode-switch">
            <button id="timerModeBtn" class="active" onclick="switchMode('timer')">TIMER</button>
            <button id="swModeBtn" onclick="switchMode('stopwatch')">STOPWATCH</button>
        </div>

        <div id="timer-input-ui">
            <div class="picker-container">
                <div class="scroll-wheel" id="h-wheel" onscroll="updatePickerSelection(this)"></div>
                <div class="scroll-wheel" id="m-wheel" onscroll="updatePickerSelection(this)"></div>
                <div class="scroll-wheel" id="s-wheel" onscroll="updatePickerSelection(this)"></div>
            </div>
        </div>

        <div id="display" class="hidden">00:00:00</div>

        <div class="controls">
            <button id="startBtn" class="btn start" onclick="handleStart()">START</button>
            <button id="pauseBtn" class="btn pause" onclick="handlePause()">PAUSE</button>
            <button class="btn reset" onclick="handleReset()">RESET</button>
            <button class="btn fs-btn" onclick="toggleFullscreen(true)">FULL SCREEN</button>
        </div>
    </div>

    <!-- Full Screen Overlay -->
    <div id="fs-overlay">
        <div class="fs-timer" id="fs-display">00:00:00</div>
        <button class="exit-fs" onclick="toggleFullscreen(false)">EXIT FULL SCREEN</button>
    </div>

    <div class="footer">
        Developed By: A2Z Teach<br>
        (Rupak Kushwaha)
    </div>

    <audio id="endSound" src="image/sound.mp3"></audio>

    <script>
        let mode = 'timer'; 
        let timerInterval;
        let timeInSeconds = 0;
        let isRunning = false;
        let isPaused = false;

        // Initialize Wheels
        function initWheels() {
            const hWheel = document.getElementById('h-wheel');
            const mWheel = document.getElementById('m-wheel');
            const sWheel = document.getElementById('s-wheel');
            
            fillWheel(hWheel, 24);
            fillWheel(mWheel, 60);
            fillWheel(sWheel, 60);
            
            // Trigger selection update after filling
            setTimeout(() => { 
                [hWheel, mWheel, sWheel].forEach(w => updatePickerSelection(w)); 
            }, 100);
        }

        function fillWheel(wheel, count) {
            wheel.innerHTML = '<div></div>'; // Top spacer
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.textContent = String(i).padStart(2, '0');
                wheel.appendChild(div);
            }
            wheel.innerHTML += '<div></div>'; // Bottom spacer
        }

        // Optimized scroll selection
        function updatePickerSelection(wheel) {
            const items = wheel.querySelectorAll('div');
            const index = Math.round(wheel.scrollTop / 50);
            items.forEach((item, i) => {
                if(i === index + 1) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function switchMode(newMode) {
            handleReset();
            mode = newMode;
            document.getElementById('timerModeBtn').classList.toggle('active', mode === 'timer');
            document.getElementById('swModeBtn').classList.toggle('active', mode === 'stopwatch');
            document.getElementById('timer-input-ui').classList.toggle('hidden', mode !== 'timer');
            document.getElementById('display').classList.toggle('hidden', mode === 'timer');
        }

        function formatTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function handleStart() {
            if (isRunning) return;
            if (!isPaused && mode === 'timer') {
                const h = parseInt(document.querySelector('#h-wheel .selected')?.innerText || 0);
                const m = parseInt(document.querySelector('#m-wheel .selected')?.innerText || 0);
                const s = parseInt(document.querySelector('#s-wheel .selected')?.innerText || 0);
                timeInSeconds = (h * 3600) + (m * 60) + s;
                if (timeInSeconds <= 0) return;
                document.getElementById('timer-input-ui').classList.add('hidden');
                document.getElementById('display').classList.remove('hidden');
            }
            isRunning = true;
            isPaused = false;
            updatePauseButtonUI();
            document.getElementById('startBtn').style.opacity = "0.5";
            
            timerInterval = setInterval(() => {
                if (mode === 'timer') {
                    timeInSeconds--;
                    if (timeInSeconds <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('endSound').play();
                        handleReset();
                    }
                } else { 
                    timeInSeconds++; 
                }
                const formatted = formatTime(timeInSeconds);
                document.getElementById('display').innerText = formatted;
                document.getElementById('fs-display').innerText = formatted;
            }, 1000);
        }

        function handlePause() {
            if (!isRunning && !isPaused) return;
            if (!isPaused) { 
                clearInterval(timerInterval); 
                isRunning = false; 
                isPaused = true; 
            } else { 
                handleStart(); 
            }
            updatePauseButtonUI();
        }

        function updatePauseButtonUI() {
            const btn = document.getElementById('pauseBtn');
            btn.innerText = isPaused ? "RESUME" : "PAUSE";
            btn.style.background = isPaused ? "linear-gradient(to right, #00cdac, #02aab0)" : "linear-gradient(to right, #f8ff00, #ff9100)";
        }

        function handleReset() {
            clearInterval(timerInterval);
            isRunning = false;
            isPaused = false;
            timeInSeconds = 0;
            document.getElementById('startBtn').style.opacity = "1";
            document.getElementById('display').innerText = "00:00:00";
            document.getElementById('fs-display').innerText = "00:00:00";
            updatePauseButtonUI();
            if (mode === 'timer') {
                document.getElementById('timer-input-ui').classList.remove('hidden');
                document.getElementById('display').classList.add('hidden');
            }
        }

        function toggleFullscreen(goFull) {
            if (goFull) {
                document.body.classList.add('fullscreen-mode');
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } else {
                document.body.classList.remove('fullscreen-mode');
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        initWheels();
    </script>
</body>
</html>
